name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install system dependencies (tkinter)
        run: sudo apt-get install -y python3-tk

      - name: Install Python dependencies
        run: pip install python-can cantools ruff mypy

      - name: Syntax check
        run: python -m py_compile can_viewer.py

      - name: Lint (ruff)
        run: ruff check can_viewer.py

      - name: Type check (mypy)
        run: mypy can_viewer.py --ignore-missing-imports
