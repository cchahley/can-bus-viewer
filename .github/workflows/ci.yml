name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install system dependencies (tkinter + virtual display)
        run: sudo apt-get install -y python3-tk xvfb

      - name: Install Python dependencies
        run: pip install python-can cantools ruff mypy pytest

      - name: Syntax check
        run: python -m py_compile can_viewer.py && python -c "import can_viewer"

      - name: Lint (ruff)
        run: ruff check can_viewer/ can_viewer.py

      - name: Type check (mypy)
        # attr-defined is suppressed because mypy checks each mixin in isolation
        # and cannot see cross-mixin attributes that are resolved at runtime via MRO.
        run: mypy can_viewer/ --ignore-missing-imports --disable-error-code attr-defined --disable-error-code has-type

      - name: Unit tests
        run: xvfb-run python -m pytest test_can_viewer.py -v
