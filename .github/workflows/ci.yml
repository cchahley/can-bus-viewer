name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install system dependencies
        run: sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: pip install python-can cantools pyside6 matplotlib ruff mypy pytest

      - name: Syntax check
        run: python -m py_compile can_viewer.py can_viewer_qt.py can_viewer_qt/*.py && python -c "import can_viewer_qt"

      - name: Lint (ruff)
        run: ruff check can_viewer_qt/ can_viewer.py can_viewer_qt.py

      - name: Type check (mypy)
        run: mypy can_viewer_qt/ --ignore-missing-imports

      - name: Unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: xvfb-run python -m pytest test_can_viewer_qt.py -v
